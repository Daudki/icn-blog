<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Search across all ICN Blog modules, projects, and code.">
    <title>Search | ICN Blog</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
    <style>
        .search-page {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1.25rem 4rem;
            min-height: 70vh;
        }
        .search-page-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .search-page-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .search-page-header p {
            color: #8b949e;
        }
        .search-input-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        .search-input-wrapper input {
            width: 100%;
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 0.75rem 1rem 0.75rem 3rem;
            color: #e6edf3;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input-wrapper input:focus {
            border-color: #58a6ff;
        }
        .search-input-wrapper .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #8b949e;
            font-size: 1.1rem;
        }
        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            z-index: 50;
            display: none;
        }
        .suggestion-item {
            padding: 0.6rem 1rem;
            cursor: pointer;
            color: #8b949e;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .suggestion-item:hover, .suggestion-item:focus {
            background: #1a2332;
            color: #e6edf3;
        }
        .suggestion-item mark {
            background: rgba(88,166,255,0.2);
            color: #58a6ff;
        }
        .search-summary {
            color: #8b949e;
            margin-bottom: 1.5rem;
        }
        .search-summary strong {
            color: #e6edf3;
        }
        .search-group {
            margin-bottom: 2rem;
        }
        .search-group-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #58a6ff;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #21262d;
        }
        .search-result-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 1.1rem 1.25rem;
            margin-bottom: 0.75rem;
            text-decoration: none;
            transition: all 0.15s;
        }
        .search-result-card:hover {
            border-color: #58a6ff;
            background: #1a2332;
        }
        .result-icon {
            color: #58a6ff;
            font-size: 1.3rem;
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(88,166,255,0.1);
            border-radius: 8px;
        }
        .result-content {
            flex: 1;
            min-width: 0;
        }
        .result-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
            flex-wrap: wrap;
        }
        .result-header h4 {
            font-size: 1rem;
            color: #e6edf3;
            margin: 0;
        }
        .result-header h4 mark {
            background: rgba(88,166,255,0.2);
            color: #58a6ff;
        }
        .result-code {
            font-family: monospace;
            font-size: 0.75rem;
            color: #58a6ff;
        }
        .result-relevance {
            font-size: 0.65rem;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-weight: 600;
        }
        .result-relevance.best-match {
            background: rgba(63,185,80,0.15);
            color: #3fb950;
        }
        .result-relevance.strong-match {
            background: rgba(88,166,255,0.15);
            color: #58a6ff;
        }
        .result-relevance.good-match {
            background: rgba(210,153,29,0.15);
            color: #d2991d;
        }
        .result-description {
            color: #8b949e;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .result-description mark {
            background: rgba(88,166,255,0.15);
            color: #79b8ff;
        }
        .result-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: #484f58;
            flex-wrap: wrap;
        }
        .result-meta i {
            margin-right: 0.25rem;
        }
        .result-tags {
            display: flex;
            gap: 0.35rem;
        }
        .result-tag {
            background: #0d1117;
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-family: monospace;
        }
        .result-tag mark {
            background: rgba(88,166,255,0.2);
            color: #58a6ff;
        }
        .result-arrow {
            color: #484f58;
            font-size: 0.9rem;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .search-result-card:hover .result-arrow {
            color: #58a6ff;
            transform: translateX(3px);
        }
        .search-empty {
            text-align: center;
            padding: 3rem 1rem;
            color: #8b949e;
        }
        .search-empty i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 1rem;
            color: #484f58;
        }
        .search-empty h3 {
            color: #e6edf3;
            margin-bottom: 0.5rem;
        }
        .search-empty ul {
            list-style: disc;
            text-align: left;
            max-width: 300px;
            margin: 1rem auto;
            padding-left: 1.5rem;
        }
        .search-empty li {
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
        }
        .popular-tags {
            margin-top: 1.5rem;
        }
        .popular-tags p {
            color: #484f58;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }
        .popular-tag {
            display: inline-block;
            background: #161b22;
            border: 1px solid #21262d;
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
            margin: 0.2rem;
            font-size: 0.8rem;
            color: #8b949e;
            cursor: pointer;
            font-family: monospace;
            transition: all 0.15s;
        }
        .popular-tag:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }
        @media (max-width: 768px) {
            .search-result-card {
                flex-direction: column;
                align-items: flex-start;
            }
            .result-arrow {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>

    <a href="#searchContent" class="skip-link">Skip to search</a>

    <header class="global-header">
        <div class="header-inner">
            <a href="index.html" class="header-logo">
                <i class="fa-solid fa-network-wired"></i>
                ICN Blog
            </a>
            <nav class="header-nav">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="portfolio/index.html">Portfolio</a>
                <a href="index.html#modules">Modules</a>
            </nav>
            <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </header>

    <main class="search-page" id="searchContent">
        <div class="search-page-header">
            <h1>Search Modules</h1>
            <p>Search across all modules, projects, and code.</p>
        </div>

        <div class="search-input-wrapper">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="searchPageInput" placeholder="e.g., python, networking, security, scapy..." autocomplete="off">
            <div class="search-suggestions" id="searchSuggestions"></div>
        </div>

        <div id="searchResults"></div>
    </main>

    <footer class="global-footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <h3>ICN Blog</h3>
                <p>Python × Networking × Security</p>
                <p style="font-size:0.85rem;">Mbeya University of Science & Technology</p>
            </div>
            <div class="footer-links">
                <h4>Navigate</h4>
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="portfolio/index.html">Portfolio</a>
            </div>
            <div class="footer-links">
                <h4>Resources</h4>
                <a href="https://github.com/Daudki/icn-blog" target="_blank" rel="noopener">GitHub</a>
                <a href="index.html#modules">All Modules</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>Built by <strong>theOutcast</strong> | &copy; <span id="footerYear"></span></p>
        </div>
    </footer>

    <script src="js/search.js"></script>
    <script src="js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('footerYear').textContent = new Date().getFullYear();

            await searchEngine.init();

            const input = document.getElementById('searchPageInput');
            const resultsEl = document.getElementById('searchResults');
            const suggestionsEl = document.getElementById('searchSuggestions');
            let debounceTimer;

            // Load query from URL
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            if (query) {
                input.value = query;
                renderSearchResults(query);
            } else {
                showEmptyState();
            }

            // Input handler with debounce
            input.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                const q = input.value.trim();
                if (q.length >= 2) {
                    debounceTimer = setTimeout(() => {
                        showSuggestions(q);
                    }, 200);
                } else {
                    suggestionsEl.style.display = 'none';
                    if (q.length === 0) showEmptyState();
                }
            });

            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const q = input.value.trim();
                    if (q.length >= 2) {
                        suggestionsEl.style.display = 'none';
                        renderSearchResults(q);
                        updateUrl(q);
                    }
                }
            });

            function showSuggestions(q) {
                const suggestions = searchEngine.suggest(q, 5);
                if (suggestions.length === 0) {
                    suggestionsEl.style.display = 'none';
                    return;
                }
                suggestionsEl.innerHTML = suggestions.map(s => `
                    <div class="suggestion-item" role="option" tabindex="0">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <span>${highlightMatch(s, q)}</span>
                    </div>
                `).join('');
                suggestionsEl.style.display = 'block';

                suggestionsEl.querySelectorAll('.suggestion-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const text = item.textContent.trim();
                        input.value = text;
                        suggestionsEl.style.display = 'none';
                        renderSearchResults(text);
                        updateUrl(text);
                    });
                });
            }

            function renderSearchResults(q) {
                const results = searchEngine.search(q);
                if (results.length === 0) {
                    resultsEl.innerHTML = `
                        <div class="search-empty">
                            <i class="fa-solid fa-face-frown"></i>
                            <h3>No results found</h3>
                            <p>We couldn't find anything matching "<strong>${escapeHtml(q)}</strong>"</p>
                            <p>Try:</p>
                            <ul>
                                <li>Checking your spelling</li>
                                <li>Using fewer words</li>
                                <li>Searching for a specific technology</li>
                            </ul>
                        </div>`;
                    return;
                }

                const grouped = {};
                results.forEach(r => {
                    const y = r.module.year;
                    if (!grouped[y]) grouped[y] = [];
                    grouped[y].push(r);
                });

                let html = `<div class="search-summary"><p>Found <strong>${results.length}</strong> result${results.length !== 1 ? 's' : ''} for "<strong>${escapeHtml(q)}</strong>"</p></div>`;

                for (const [year, items] of Object.entries(grouped)) {
                    const yearLabel = year.replace('year', 'Year ');
                    html += `<div class="search-group"><h3 class="search-group-title">${yearLabel}</h3>`;
                    html += items.map(({ module, relevance }) => renderResultCard(module, relevance, q)).join('');
                    html += '</div>';
                }

                resultsEl.innerHTML = html;
            }

            function renderResultCard(module, relevance, q) {
                const icons = {
                    'programming': 'fa-code', 'networking': 'fa-network-wired', 'security': 'fa-shield-haltered',
                    'data': 'fa-database', 'systems': 'fa-server', 'ai': 'fa-brain', 'web': 'fa-globe',
                    'cloud': 'fa-cloud', 'iot': 'fa-microchip', 'forensics': 'fa-magnifying-glass',
                    'hacking': 'fa-user-secret', 'default': 'fa-book'
                };
                const icon = icons[module.icon] || 'fa-book';
                const pc = module.projects ? module.projects.length : 0;
                const relClass = relevance.toLowerCase().replace(/\s+/g, '-');

                return `
                <a href="${module.url}" class="search-result-card">
                    <div class="result-icon"><i class="fa-solid ${icon}"></i></div>
                    <div class="result-content">
                        <div class="result-header">
                            <h4>${highlightMatch(module.name, q)}</h4>
                            <span class="result-code">${module.code || ''}</span>
                            <span class="result-relevance ${relClass}">${relevance}</span>
                        </div>
                        <p class="result-description">${highlightMatch((module.description || '').substring(0, 150), q)}</p>
                        <div class="result-meta">
                            <span><i class="fa-solid fa-calendar"></i> ${module.semesterName}</span>
                            <span><i class="fa-solid fa-code"></i> ${pc} project${pc !== 1 ? 's' : ''}</span>
                            <span class="result-tags">${(module.tags || []).slice(0, 3).map(t => `<span class="result-tag">${highlightMatch(t, q)}</span>`).join('')}</span>
                        </div>
                    </div>
                    <div class="result-arrow"><i class="fa-solid fa-chevron-right"></i></div>
                </a>`;
            }

            function showEmptyState() {
                const allTags = searchEngine.getAllTags();
                resultsEl.innerHTML = `
                    <div class="search-empty">
                        <i class="fa-solid fa-search"></i>
                        <h3>Search Modules</h3>
                        <p>Type at least 2 characters to search across all ${searchEngine.getModuleCount()} modules and ${searchEngine.getProjectCount()} projects.</p>
                        <div class="popular-tags">
                            <p>Popular topics:</p>
                            ${allTags.slice(0, 10).map(t => `<span class="popular-tag" onclick="document.getElementById('searchPageInput').value='${t}'; renderSearchResults('${t}'); updateUrl('${t}');">${t}</span>`).join('')}
                        </div>
                    </div>`;
            }

            function updateUrl(q) {
                if (history.pushState) {
                    history.pushState({}, '', `search.html?q=${encodeURIComponent(q)}`);
                }
            }

            function highlightMatch(text, query) {
                if (!query) return text;
                const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // Expose for onclick handlers
            window.renderSearchResults = renderSearchResults;
            window.updateUrl = updateUrl;
        });
    </script>
</body>
</html>
